services:
  db:
    image: mysql:8.0
    container_name: travel_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travel_budget
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: travel_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      - db

volumes:
  db_data: